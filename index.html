<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to MP4 | Dark Mode</title>
    
    <!-- 1. CRITICAL: Load Service Worker first for GitHub Pages -->
    <script src="coi-serviceworker.js"></script>

    <!-- 2. CRITICAL: CDN Scripts with crossorigin attribute -->
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #bb86fc;
            --accent-hover: #9965f4;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border);
        }

        h2 { color: var(--accent); margin-top: 0; }

        input[type="file"] {
            display: block;
            width: 100%;
            margin: 20px 0;
            padding: 10px;
            background: #252525;
            border: 1px dashed var(--border);
            border-radius: 6px;
            color: #aaa;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--accent-hover); }

        #log {
            margin-top: 20px;
            background: #000;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 15px;
            height: 120px;
            overflow-y: auto;
            border-radius: 6px;
            border: 1px solid #333;
            text-align: left;
        }

        video {
            margin-top: 20px;
            width: 100%;
            border-radius: 8px;
            display: none;
            border: 1px solid var(--border);
        }

        .status-msg { font-size: 0.85em; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Image to MP4</h2>
        <p class="status-msg">Images must have numbers in filenames (e.g. img1.jpg)</p>
        
        <input type="file" id="uploader" multiple accept="image/*">
        <button id="convert-btn">Generate Video</button>
        
        <div id="log">Ready to process...</div>
        <video id="output-video" controls></video>
    </div>

    <script>
        const { FFmpeg } = FFmpegWASM;
        const { fetchFile } = FFmpegUtil;
        let ffmpeg = null;

        const logEl = document.getElementById('log');
        const log = (msg) => {
            logEl.innerHTML += `<div>> ${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        };

        document.getElementById('convert-btn').addEventListener('click', async () => {
            const files = Array.from(document.getElementById('uploader').files);
            if (files.length === 0) return alert("Please select images!");

            // Sort files by number in name
            files.sort((a, b) => {
                const numA = parseInt(a.name.match(/\d+/) || 0);
                const numB = parseInt(b.name.match(/\d+/) || 0);
                return numA - numB;
            });

            try {
                if (!ffmpeg) {
                    ffmpeg = new FFmpeg();
                    ffmpeg.on('log', ({ message }) => log(message));
                    log("Loading FFmpeg engine...");
                    await ffmpeg.load({
                        coreURL: 'https://jsdelivr.net',
                    });
                }

                log(`Processing ${files.length} images...`);
                for (let i = 0; i < files.length; i++) {
                    await ffmpeg.writeFile(`img${i}.png`, await fetchFile(files[i]));
                }

                log("Encoding MP4 (1 second per frame)...");
                await ffmpeg.exec([
                    '-framerate', '1', 
                    '-i', 'img%d.png', 
                    '-c:v', 'libx264', 
                    '-pix_fmt', 'yuv420p', 
                    'output.mp4'
                ]);

                const data = await ffmpeg.readFile('output.mp4');
                const video = document.getElementById('output-video');
                video.src = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                video.style.display = 'block';
                log("Done! Check video below.");

            } catch (e) {
                log("FATAL ERROR: " + e.message);
                console.error(e);
            }
        });
    </script>
</body>
</html>
